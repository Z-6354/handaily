<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>解包 — 小寒导入器</title>
  <link rel="stylesheet" href="/design-system/tokens.css" />
  <link rel="stylesheet" href="/shell.css" />
  <link rel="stylesheet" href="/components.css" />
  <link rel="stylesheet" href="/pages/unpack.css" />
</head>
<body>
  <div id="shell-root"></div>
  <div id="job-banner" class="banner" hidden></div>
  <div class="wrap">
    <header class="page-header">
      <div class="page-header-main">
        <h1 class="page-title">解包</h1>
        <p class="page-sub">碧蓝航线 AssetBundle → Spine / Live2D · 选文件夹或补选多个文件批量解包</p>
      </div>
    </header>

    <section class="card" id="status-card">
      <h2>环境</h2>
      <div id="status-body" class="muted">检测中…</div>
    </section>

    <section class="card">
      <h2>解包</h2>
      <label>
        输入路径（文件夹或单个 bundle）
        <div class="path-row">
          <input id="input-path" type="text" placeholder="例如 D:\HANDAILY\data\model\azurlane\custom" />
          <button type="button" id="btn-browse-input" class="secondary">浏览文件夹…</button>
        </div>
      </label>
      <div class="extra-files-block">
        <div class="extra-files-head">
          <span>附加文件</span>
          <div class="actions-inline">
            <button type="button" id="btn-browse-files" class="secondary">添加文件…</button>
            <button type="button" id="btn-clear-extra" class="ghost" disabled>清空</button>
          </div>
        </div>
        <ul id="extra-files" class="extra-files muted">尚未添加</ul>
      </div>
      <label>
        输出目录（留空自动选择）
        <div class="path-row">
          <input id="output-path" type="text" placeholder="Live2D → data/live2d；Cubism → data/model/unpacked" />
          <button type="button" id="btn-browse-output" class="secondary">浏览…</button>
        </div>
      </label>
      <label class="check">
        <input id="dry-run" type="checkbox" />
        仅预览（dry-run，不写文件）
      </label>
      <label class="check"><input id="opt-gen-config" type="checkbox" checked /> 写入后生成 JSON</label>
      <label class="check"><input id="opt-continue" type="checkbox" /> 遇错继续</label>
      <div class="progress-wrap" hidden id="progress-wrap">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="progress-label" class="muted"></div>
      </div>
      <div class="actions">
        <button id="btn-scan" type="button">扫描</button>
        <button id="btn-unpack" type="button" class="primary">开始解包</button>
        <button id="btn-config" type="button">生成 JSON 配置</button>
      </div>
    </section>

    <section class="card">
      <h2>扫描结果</h2>
      <div id="scan-result" class="muted">尚未扫描</div>
    </section>

    <section class="card">
      <h2>日志</h2>
      <pre id="log"></pre>
    </section>
  </div>
  <script src="/shell.js"></script>
  <script src="/app.js"></script>
  <script>HanShell.mount({ active: "unpack" });</script>
</body>
</html>
